# Lancio dashboard con volumi persistenti + env da file.
# Uso:
#     docker compose up --build
#     docker compose up -d             # detached
#     docker compose logs -f           # segui log
#     docker compose exec dashboard propicks-momentum AAPL   # esegui CLI nel container

services:
  dashboard:
    build: .
    image: propicks-dashboard:latest
    container_name: propicks-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./corp-ca-bundle.pem:/etc/ssl/certs/corp-ca-bundle.pem:ro
    env_file:
      - .env
    restart: unless-stopped
